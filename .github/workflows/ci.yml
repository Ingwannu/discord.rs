name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_MIN_LINES: 90.0
jobs:
  rust-check:
    name: rust-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Cargo check (all features)
        run: cargo check --all-features --locked

      - name: Cargo check (default features)
        run: cargo check --locked

      - name: Cargo check (examples, default features)
        run: cargo check --examples --locked

      - name: Cargo check (examples, all features)
        run: cargo check --examples --all-features --locked

      - name: Cargo test (all features)
        run: cargo test --all-features --locked --no-fail-fast

      - name: Cargo test (default features)
        run: cargo test --locked

      - name: Cargo clippy (all features)
        run: cargo clippy --all-features --all-targets --locked -- -D warnings

      - name: Cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: Cargo clippy (default features)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Cargo fmt (check)
        run: cargo fmt --all -- --check

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup component add llvm-tools-preview
          rustc --version
          cargo --version

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --locked --lcov --output-path lcov.info --fail-under-lines ${{ env.COVERAGE_MIN_LINES }}

      - name: Validate LCOV scope
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          lcov = Path("lcov.info").read_text()
          files = {line[3:].replace("\\", "/") for line in lcov.splitlines() if line.startswith("SF:")}
          src_files = {path for path in files if "/src/" in path}
          line_records = len(re.findall(r"^DA:", lcov, re.MULTILINE))
          required = ("src/http.rs", "src/voice_runtime.rs", "src/gateway/bot.rs", "src/event.rs")
          missing = [suffix for suffix in required if not any(path.endswith(suffix) for path in src_files)]
          if len(src_files) < 30 or line_records < 20_000 or missing:
              raise SystemExit(
                  "LCOV report is too narrow for Coveralls upload: "
                  f"src_files={len(src_files)} line_records={line_records} missing={missing}"
              )
          print(f"LCOV scope OK: {len(src_files)} source files, {line_records} line records")
          PY

      - name: Upload LCOV artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: lcov.info
